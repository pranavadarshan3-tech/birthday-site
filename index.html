<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<title>Happy Birthday janani</title>

<style>
  .slide{
display:none;
text-align:center;
}

.slide img{
width:300px;
border-radius:15px;
margin-top:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

button{
padding:12px 20px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
background:#ff4b6e;
color:white;
cursor:pointer;
}
body{
font-family:Arial;
text-align:center;
background:#ff6f91;
color:white;
}

h1{
font-size:50px;
margin-top:80px;
}

button{
padding:15px 25px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:white;
color:#ff4b6e;
}

#message{
font-size:25px;
margin-top:30px;
}

img{
width:220px;
border-radius:15px;
margin:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<h1>Happy Birthday My Dear Sister </h1>

<p>You are not just my sister, you are my everything </p>

<button onclick="showMemories()">📸 Show Memories</button>
  
<div id="memories" style="display:none;">

<div class="slide">
<img src="photo1.jpg">
</div>

<div class="slide">
<img src="photo2.jpg">
</div>

<div class="slide">
<img src="photo3.jpg">
</div>

<div class="slide">
<h1>❤️ Final Message ❤️</h1>
<p>Happy Birthday Sister! Thank you for all the memories and for always being there for me. You are the best! 🎂</p>
</div>

<br>

<button onclick="prevSlide()">⬅ Previous</button>
<button onclick="nextSlide()">Next ➡</button>

</div>
<h2> Do you know who loves you the most?</h2>

<button onclick="answer()">Mommy</button>
<button onclick="answer()">Daddy</button>
<button onclick="answer()">Pavi</button>
<button onclick="correct()">Me</button>

<div id="message"></div>

<br><br>

<button onclick="surprise()"> Open Birthday Surprise</button>

<script>

function answer(){
document.getElementById("message").innerHTML =
"Wrong  Try again!";
}

function correct(){
document.getElementById("message").innerHTML =
"Correct! I love you the most. Happy Birthday janani!";
}

function surprise(){
document.getElementById("message").innerHTML =
" Surprise! You are the best sister in the world. I'm lucky to have you!";
}

</script>
<script>

function startConfetti() {
  var duration = 6 * 1000;
  var end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 6,
      angle: 60,
      spread: 70,
      origin: { x: 0 }
    });

    confetti({
      particleCount: 6,
      angle: 120,
      spread: 70,
      origin: { x: 1 }
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
}

window.onload = startConfetti;

</script>
  <script>

let currentSlide = 0;
let slides = document.getElementsByClassName("slide");

function showMemories(){
document.getElementById("memories").style.display="block";
showSlide(currentSlide);
}

function showSlide(index){
for(let i=0;i<slides.length;i++){
slides[i].style.display="none";
}

slides[index].style.display="block";
}

function nextSlide(){
currentSlide++;
if(currentSlide >= slides.length){
currentSlide = 0;
}
showSlide(currentSlide);
}

function prevSlide(){
currentSlide--;
if(currentSlide < 0){
currentSlide = slides.length - 1;
}
showSlide(currentSlide);
}

</script>
</body>
</html>
